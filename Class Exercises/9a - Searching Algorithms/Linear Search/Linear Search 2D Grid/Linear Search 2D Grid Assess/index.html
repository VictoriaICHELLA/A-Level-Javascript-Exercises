<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Search 2D Grid Assess</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Linear Search 2D Grid Assess</h1>
        <div class="array-display">
            <h3>Board Grid:</h3>
            <p id="array-display">[ ]</p>
        </div>
        <div class="controls">
            <button id="generate-btn">Generate New Board</button>
        </div>
        <div class="search-section">
            <h3>Enter Piece To Find:</h3>
            <input type="text" id="search-input" placeholder="e.g. Q">
            <button id="search-btn">Search</button>
        </div>
        <div class="result">
            <h3>Search Result:</h3>
            <p id="search-result">Result will appear here</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
